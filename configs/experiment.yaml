# ============================================================
# Hugo — Experiment Configuration
# CIC-MalMem-2022 | Binary (benign vs malware) | SLM-first
# ============================================================

# --- Dataset ---
dataset:
  name: "CIC-MalMem-2022"
  path: "data/CIC-MalMem-2022.csv"
  target_column: "Class"          
  positive_label: "Malware"
  task: "binary"
  drop_columns:                   
    - "Category"                  
    - "Filename"                  
    - "Class"                     
    - "label"

# --- Splits ---
splits:
  standard:
    train: 0.70
    val: 0.15
    test: 0.15
    stratify: true

  unseen_family:
    enabled: false                # Desativado: a coluna 'family' não existe no CSV novo
    family_column: "Category"
    hold_out_families: ["Spyware"]   
    method: "leave_one_family_out"            

# --- Seeds (reprodutibilidade) ---
seeds: [42, 123, 456, 789, 2024]

# --- Preprocessing (tabular) ---
preprocessing:
  numeric:
    strategy: "zscore"          
  categorical:
    strategy: "onehot"          
  remove_constant_features: true
  remove_duplicates: true

# --- Serialização (texto para SLM) ---
serialization:
  format: "key=value"
  separator: " ; "
  sort_keys: true               
  numeric_precision: 4
  max_tokens: 512               
  exclude_columns: []           

# --- Baselines ---
baselines:
  random_forest:
    n_estimators: 500
    max_depth: null
    min_samples_leaf: 2
    class_weight: "balanced"
    n_jobs: -1

  xgboost:
    n_estimators: 500
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    scale_pos_weight: 1.0       
    tree_method: "hist"
    n_jobs: -1

  mlp:
    hidden_layers: [256, 128, 64]
    activation: "relu"
    dropout: 0.3
    optimizer: "adam"
    learning_rate: 0.001
    batch_size: 256
    epochs: 50
    early_stopping:
      patience: 5
      monitor: "val_loss"

  mlp_rf:                        
    mlp:
      hidden_layers: [256, 128, 64]
      activation: "relu"
      dropout: 0.3
      optimizer: "adam"
      learning_rate: 0.001
      batch_size: 256
      epochs: 50
      early_stopping:
        patience: 5
        monitor: "val_loss"
    embedding_layer: -2          
    rf:
      n_estimators: 500
      max_depth: null
      min_samples_leaf: 2
      class_weight: "balanced"

# --- SLM ---
slm:
  candidates:                    
    - "Qwen/Qwen2.5-1.5B"
    - "HuggingFaceTB/SmolLM2-1.7B"
  active_model: "Qwen/Qwen2.5-1.5B"   
  max_seq_len: 512
  batch_size: 16
  device: "cuda"
  dtype: "float16"

  embedding:
    pooling: "mean_last_hidden"          
    heads:
      - "xgboost"
      - "random_forest"
      - "logistic_regression"
    head_params:
      xgboost:
        n_estimators: 500
        max_depth: 6
        learning_rate: 0.1
      random_forest:
        n_estimators: 500
      logistic_regression:
        C: 1.0
        max_iter: 1000

  benign_only:
    training: "causal_lm"              
    lora:
      enabled: true
      rank: 16
      alpha: 32
      dropout: 0.05
      target_modules: ["q_proj", "v_proj"]
    learning_rate: 0.0002
    epochs: 3
    early_stopping:
      patience: 2
      monitor: "val_loss"
    score: "mean_token_nll"            
    thresholds:
      fpr_targets: [0.001, 0.01, 0.05]  

  quantization:
    enabled: true
    method: "bitsandbytes"
    bits: 4
    compute_dtype: "float16"

# --- Métricas ---
metrics:
  classification:
    - "pr_auc"
    - "f1_macro"
    - "f1_per_class"
    - "precision"
    - "recall"
    - "fpr_at_tpr_95"
    - "confusion_matrix"
    - "roc_auc"
  deployment:
    - "latency_per_sample_ms"
    - "throughput_samples_per_sec"
    - "ram_mb"
    - "vram_mb"
  report:
    format: "csv"               
    confidence: "mean_std"      

# --- Paths ---
paths:
  raw_data: "data/"
  processed_data: "data/processed/"
  models: "outputs/models/"
  results: "outputs/results/"
  plots: "outputs/plots/"
  logs: "outputs/logs/"